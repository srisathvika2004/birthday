<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(to bottom right, #ffe6f0, #e6f7ff);
  overflow: hidden;
}

.page {
  display: none;
  height: 100vh;
  width: 100%;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  position: relative;
}

#page1 { display: flex; }

h1 { color: #ff4d6d; }

button {
  padding: 12px 20px;
  border: none;
  border-radius: 20px;
  margin: 10px;
  font-size: 16px;
  cursor: pointer;
}

#yesBtn { background: #ff85a2; color: white; }
#noBtn { background: #ccc; position: absolute; }

#page2 {
  background: linear-gradient(to bottom right, #fff0f5, #e6ffff);
  overflow: hidden;
}

img.main {
  width: 160px;
  height: 160px;
  border-radius: 50%;
  object-fit: cover;
  border: 4px solid #ff85a2;
  z-index: 2;
}

.message-line {
  font-size: 18px;
  color: #ff4d6d;
  margin: 6px 0;
  opacity: 0;
  transform: translateY(20px);
  transition: 0.8s;
  z-index: 2;
}

.highlight { color: #ff1493; font-weight: bold; }

/* FIX: animations visible */
.heart, .confetti, .balloon {
  position: fixed;
  z-index: 1;
}

.heart {
  font-size: 20px;
  animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(100vh); opacity: 1; }
  100% { transform: translateY(-10vh); opacity: 0; }
}

.confetti {
  width: 8px;
  height: 8px;
  background: pink;
  animation: fall linear infinite;
}

@keyframes fall {
  0% { transform: translateY(-100vh); }
  100% { transform: translateY(100vh); }
}

.balloon {
  font-size: 24px;
  animation: floatBalloon 6s linear infinite;
}

@keyframes floatBalloon {
  0% { transform: translateY(100vh); }
  100% { transform: translateY(-10vh); }
}

.car {
  position: fixed;
  bottom: 10px;
  font-size: 40px;
  animation: drive 8s linear infinite;
  z-index: 2;
}

@keyframes drive {
  0% { left: -30%; }
  100% { left: 120%; }
}

.play-btn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #ff85a2;
  color: white;
  border-radius: 50%;
  width: 50px;
  height: 50px;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 3;
}

.hug-btn {
  position: fixed;
  bottom: 20px;
  left: 20px;
  background: #ff4d6d;
  color: white;
  padding: 10px 15px;
  border-radius: 20px;
  z-index: 3;
}
</style>
</head>

<body>

<audio id="music" src="https://www.bensound.com/bensound-music/bensound-romantic.mp3"></audio>

<div class="page" id="page1">
  <h1>Do you wanna see what? 💖</h1>
  <button id="yesBtn">Yes 😍</button>
  <button id="noBtn">No 🙈</button>
</div>

<div class="page" id="page2">

  <img src="IMG_3761.jpeg" class="main">

  <div id="messages">
    <div class="message-line">🎉 Happy Birthday to the greatest man ❤️</div>
    <div class="message-line">You are always vanilla to my brownie 🍫✨</div>
    <div class="message-line">Happy Birthday BAEb 😘</div>
    <div class="message-line highlight">I love you and Missing youuu 🥺❤️</div>
    <div class="message-line">Nuv anukunnadhi sadinchi raa ❤️</div>
    <div class="message-line">I am with you alwaysss 💖</div>
  </div>
    

  <div class="play-btn" id="playPause">⏸</div>
  <div class="hug-btn" id="hugBtn">🤗 Hug</div>

  <div class="car">🚗👨‍✈️🍦👩 🐼🌸💖</div>

</div>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const page1 = document.getElementById("page1");
const page2 = document.getElementById("page2");
const music = document.getElementById("music");

function moveNo() {
  const x = Math.random() * 300 - 150;
  const y = Math.random() * 300 - 150;
  noBtn.style.transform = `translate(${x}px, ${y}px)`;
}

noBtn.addEventListener("mouseover", moveNo);
noBtn.addEventListener("click", moveNo);

yesBtn.onclick = () => {
  page1.style.display = "none";
  page2.style.display = "flex";
  music.play();
  showMessages();
  createHearts();
  createConfetti();
  createBalloons();
};

function showMessages() {
  document.querySelectorAll(".message-line").forEach((el,i)=>{
    setTimeout(()=>{
      el.style.opacity=1;
      el.style.transform='translateY(0)';
    },i*1000);
  });
}

function createHearts(){
  setInterval(()=>{
    let h=document.createElement('div');
    h.className='heart';
    h.innerHTML='💖';
    h.style.left=Math.random()*100+'vw';
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
  },300);
}

function createConfetti(){
  setInterval(()=>{
    let c=document.createElement('div');
    c.className='confetti';
    c.style.left=Math.random()*100+'vw';
    c.style.animationDuration=(Math.random()*3+2)+'s';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(),5000);
  },200);
}

function createBalloons(){
  setInterval(()=>{
    let b=document.createElement('div');
    b.className='balloon';
    b.innerHTML='🎈';
    b.style.left=Math.random()*100+'vw';
    document.body.appendChild(b);
    setTimeout(()=>b.remove(),6000);
  },600);
}

// HUG FIX
const hugBtn=document.getElementById('hugBtn');
hugBtn.onclick=()=>{
  let hug=document.createElement('div');
  hug.innerHTML='🤗💖 Tight hug for you!!';
  hug.style.position='fixed';
  hug.style.top='60%';
  hug.style.left='50%';
  hug.style.transform='translate(-50%,-50%)';
  hug.style.background='#ffe6f0';
  hug.style.padding='15px';
  hug.style.borderRadius='20px';
  hug.style.zIndex='5';
  document.body.appendChild(hug);
  setTimeout(()=>hug.remove(),3000);
};
</script>

</body>
</html>
